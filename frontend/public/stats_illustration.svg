<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" rx="20" fill="#ecfeff"/>
  
  <!-- Stats bars -->
  <rect x="40" y="180" width="60" height="80" rx="8" fill="#06b6d4" opacity="0.3"/>
  <rect x="40" y="200" width="60" height="60" rx="8" fill="#06b6d4"/>
  <text x="70" y="195" text-anchor="middle" fill="#0e7490" font-family="sans-serif" font-size="9">SIH</text>
  
  <rect x="120" y="150" width="60" height="110" rx="8" fill="#0891b2" opacity="0.3"/>
  <rect x="120" y="170" width="60" height="90" rx="8" fill="#0891b2"/>
  <text x="150" y="165" text-anchor="middle" fill="#0e7490" font-family="sans-serif" font-size="9">Unstop</text>
  
  <rect x="200" y="120" width="60" height="140" rx="8" fill="#06b6d4" opacity="0.3"/>
  <rect x="200" y="140" width="60" height="120" rx="8" fill="#06b6d4"/>
  <text x="230" y="135" text-anchor="middle" fill="#0e7490" font-family="sans-serif" font-size="9">Devfolio</text>
  
  <rect x="280" y="100" width="60" height="160" rx="8" fill="#0891b2" opacity="0.3"/>
  <rect x="280" y="120" width="60" height="140" rx="8" fill="#0891b2"/>
  <text x="310" y="115" text-anchor="middle" fill="#0e7490" font-family="sans-serif" font-size="9">HackerEarth</text>
  
  <!-- Trend line -->
  <path d="M70 220 Q150 180 230 160 Q310 140 340 100" stroke="#22d3ee" stroke-width="3" fill="none" stroke-linecap="round"/>
  <circle cx="70" cy="220" r="5" fill="#06b6d4"/>
  <circle cx="150" cy="180" r="5" fill="#06b6d4"/>
  <circle cx="230" cy="160" r="5" fill="#06b6d4"/>
  <circle cx="310" cy="140" r="5" fill="#0891b2"/>
  <circle cx="340" cy="100" r="5" fill="#0891b2">
    <animate attributeName="r" values="5;8;5" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Title -->
  <text x="200" y="50" text-anchor="middle" fill="#0e7490" font-family="sans-serif" font-size="14" font-weight="700">Platform Growth</text>
  <text x="200" y="70" text-anchor="middle" fill="#155e75" font-family="sans-serif" font-size="10">Problems aggregated per platform</text>
</svg>
