<svg xmlns="http://www.w3.org/2000/svg" width="400" height="350" viewBox="0 0 400 350" fill="none">
  <rect width="400" height="350" rx="20" fill="#ecfeff"/>
  
  <!-- ML Brain -->
  <circle cx="200" cy="120" r="60" fill="#06b6d4" opacity="0.15"/>
  <circle cx="200" cy="120" r="40" fill="#06b6d4" opacity="0.25"/>
  <circle cx="200" cy="120" r="20" fill="#06b6d4"/>
  <circle cx="200" cy="120" r="8" fill="white"/>
  
  <!-- Neural connections -->
  <path d="M160 120 Q140 100 120 120" stroke="#0891b2" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M160 120 Q140 140 120 120" stroke="#0891b2" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M240 120 Q260 100 280 120" stroke="#0891b2" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M240 120 Q260 140 280 120" stroke="#0891b2" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M200 80 Q180 60 200 40" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M200 80 Q220 60 200 40" stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.5"/>
  
  <!-- Data categories -->
  <rect x="40" y="200" width="80" height="50" rx="10" fill="white" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="80" y="220" text-anchor="middle" fill="#06b6d4" font-family="sans-serif" font-size="10" font-weight="600">AI/ML</text>
  <text x="80" y="238" text-anchor="middle" fill="#0891b2" font-family="sans-serif" font-size="8">2,450</text>
  
  <rect x="160" y="200" width="80" height="50" rx="10" fill="white" stroke="#0891b2" stroke-width="1.5"/>
  <text x="200" y="220" text-anchor="middle" fill="#0891b2" font-family="sans-serif" font-size="10" font-weight="600">Web</text>
  <text x="200" y="238" text-anchor="middle" fill="#0e7490" font-family="sans-serif" font-size="8">1,890</text>
  
  <rect x="280" y="200" width="80" height="50" rx="10" fill="white" stroke="#0e7490" stroke-width="1.5"/>
  <text x="320" y="220" text-anchor="middle" fill="#0e7490" font-family="sans-serif" font-size="10" font-weight="600">IoT</text>
  <text x="320" y="238" text-anchor="middle" fill="#155e75" font-family="sans-serif" font-size="8">1,230</text>
  
  <!-- Arrows from brain to categories -->
  <path d="M180 140 L80 200" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <path d="M200 140 L200 200" stroke="#0891b2" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  <path d="M220 140 L320 200" stroke="#0e7490" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.4"/>
  
  <!-- Pulse dots -->
  <circle cx="130" cy="170" r="3" fill="#22d3ee">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="170" r="3" fill="#22d3ee">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <circle cx="270" cy="170" r="3" fill="#22d3ee">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite" begin="1s"/>
  </circle>
  
  <text x="200" y="290" text-anchor="middle" fill="#0e7490" font-family="sans-serif" font-size="12" font-weight="600">ML-Powered Classification</text>
  <text x="200" y="310" text-anchor="middle" fill="#155e75" font-family="sans-serif" font-size="10">Automatically categorize problems by domain</text>
</svg>
